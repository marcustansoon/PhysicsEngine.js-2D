const getDistance = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

function sliceSheet(texture, frameCount, frameWidth, frameHeight) {
	const frames = [];

	let x = 0;
	let y = 0;

	for (let i = 0; i < frameCount; i++) {
		const frame = new PIXI.Rectangle(x, y, frameWidth, frameHeight);

		const newTex = new PIXI.Texture({
			source: texture.source, // ✅ IMPORTANT (v8)
			frame: frame
		});

		frames.push(newTex);

		x += frameWidth;

		if (x + frameWidth > texture.width) {
			x = 0;
			y += frameHeight;
		}
	}

	return frames;
}

class LoadingScene {

      this.app = app;

      this.isDestroyed = false;
      this.loadResources();
    }

		await PIXI.Assets.load([
			{
			  alias: "chef-idle",
			  src: "chef-idle-675x700.png"
			},
			{
			  alias: "chef-walking",
			  src:

			},

		]);
		
		this.setCompletion();
	}
	
	setCompletion() {
		this.isComplete = true;
		console.log('done');
	}
	
	show() {
		this.app.stage.addChild(this.container);

    hide() {

	}

class InputController {
    constructor(overlay, chef, internalContainer) {
        this.overlay = overlay;
        this.chef = chef;
        this.internalContainer = internalContainer;

        this.pointerDownPos = null;
        this.currentContainerPos = null;
        this.isPointerDown = false;

        this.setupListeners();
    }

    setupListeners() {
        this.overlay.on('pointerdown', this.onPointerDown.bind(this));
        this.overlay.on('pointermove', this.onPointerMove.bind(this));
        this.overlay.on('pointerup', this.onPointerUp.bind(this));
        this.overlay.on('pointerout', this.onPointerUp.bind(this));
    }

    onPointerDown(event) {
        this.isPointerDown = true;
        this.pointerDownPos = event.data.global.clone();
        this.currentContainerPos = {
            x: this.internalContainer.x,
            y: this.internalContainer.y
        };
    }

    onPointerMove(event) {
        if(!this.isPointerDown) return;
        const currentMovePos = event.data.global.clone();
        if (getDistance(currentMovePos.x, currentMovePos.y, this.pointerDownPos.x, this.pointerDownPos.y) >= 10) {
            this.internalContainer.x = this.currentContainerPos.x + currentMovePos.x - this.pointerDownPos.x;
            this.internalContainer.y = this.currentContainerPos.y + currentMovePos.y - this.pointerDownPos.y;
        }
    }

    onPointerUp(event) {
        if(!this.isPointerDown) return;
        this.isPointerDown = false;
        const currentMovePos = event.data.global.clone();
        if (getDistance(currentMovePos.x, currentMovePos.y, this.pointerDownPos.x, this.pointerDownPos.y) < 10) {
			const x = this.pointerDownPos.x - this.currentContainerPos.x;
			const y = this.pointerDownPos.y - this.currentContainerPos.y;
			console.log(x, y);
            this.chef.moveTo(x, y);
        }
    }
}

class Chef {
	constructor(){
		this.animations = this.getAnimations();
		console.log(this.animations);
		this.sprite = new PIXI.AnimatedSprite(this.animations.idle);
		this.currentAnim = 'idle';
		
		this.sprite.anchor.set(0.5);
		this.sprite.scale.set(0.3);
		
		this.gsap = null;
		this.direction = 'right';

		this.sprite.animationSpeed = 0.15;
		this.sprite.play();
		
	}
	
	getAnimations() {
		const idleTex = PIXI.Texture.from('chef-idle');
		const walkTex = PIXI.Texture.from('chef-walking');
		const chopTex = PIXI.Texture.from('chef-chopping');
		
		const animations = {
			idle: sliceSheet(idleTex, 5, 225, 350),
			chop: sliceSheet(chopTex, 5, 225, 350),
			walk: sliceSheet(walkTex, 4, 225, 350),
		};
		
		return animations;
	}
	
	setDirection(name){
		if(this.direction === name) return;
		this.direction = name;
		
		console.log(name);
		switch (name) {
			case 'right':
				this.sprite.scale.x = Math.abs(this.sprite.scale.x); 
			break;
			default:
				this.sprite.scale.x = -Math.abs(this.sprite.scale.x); 
			
		}
	}
	
	setAnimation(name){
		if (this.currentAnim === name) return;
		if (!this.animations[name]) return;
		console.log(name)
		this.currentAnim = name;
		this.sprite.textures = this.animations[name];
		this.sprite.play();
	}
	
	moveTo(x, y) {
		// If there’s already a tween running, kill it
		if (this.gsap) this.gsap.kill();

class CircularProgress {
	constructor(radius = 20) {
		this.radius = radius;
		this.progress = 0;

		this.graphics = new PIXI.Graphics();
	}

	setProgress(value) {
		this.progress = Math.max(0, Math.min(1, value));
		this.draw();
	}

	draw() {
		const g = this.graphics;
		g.clear();

		// Background circle
		g.setStrokeStyle({ width: 4, color: 0x333333 });
		g.circle(0, 0, this.radius);
		g.stroke();

		// Progress arc
		const startAngle = -Math.PI / 2;
		const endAngle = startAngle + this.progress * Math.PI * 2;

		g.setStrokeStyle({ width: 4, color: 0x00ff00 });
		g.arc(0, 0, this.radius, startAngle, endAngle);
		g.stroke();
	}
}

class ProgressBar {
	constructor(width = 100, height = 10) {
		this.width = width;
		this.height = height;
		this.progress = 0;

		this.graphics = new PIXI.Graphics();
		this.draw();
	}

	setProgress(value) {
		this.progress = Math.max(0, Math.min(1, value));
		this.draw();
	}

	draw() {
		const g = this.graphics;
		g.clear();

		// Background
		g.setFillStyle({ color: 0x333333 });
		g.rect(0, 0, this.width, this.height);
		g.fill();

		// Progress fill
		g.setFillStyle({ color: 0x00ff00 });
		g.rect(0, 0, this.width * this.progress, this.height);
		g.fill();
	}
}

class MultiplayerManager {
	constructor(app) {
	    this.app = app;
	    this.peers = new Map(); // peerId → { pc: RTCPeerConnection, dc: RTCDataChannel }
	    this.myID = 0;
	    this.isHost = false;
	    this.onActionReceived = null;
	    this.onPlayerJoined = null;
	}
	setMyID(id, isHost) {
		this.myID = id;
		isHost && this.setAsHost();
	}
	setAsHost() {
		this.isHost = true;
	}
	// Called on host side
	connectToClient(clientID) {
		// Set up my Peer Connection as host
		const pc = new RTCPeerConnection();
		const dataChannel = pc.createDataChannel("chat");

		dataChannel.onopen = () => console.log("Data channel open");
		dataChannel.onmessage = (event) => console.log("Message received:", event.data);

		pc.onconnectionstatechange = () => {
  			console.log("Connection state:", pc.connectionState);
		};

		let iceCandidates = [];
		let isScheduled = false;
		pc.onicecandidate = (event) => {
			// Send ICE to client
			// clientB_receiveICE({candidate: event.candidate})

			// Filter out non-null
			if(!event?.candidate) return;

			console.log('I (Host) got the ICE. Now sending to client');

			iceCandidates.push({candidate: event.candidate});

			if(isScheduled) return;
			isScheduled = true;

			setTimeout(() => {
				this.storeICECandidatesOnServer(iceCandidates);
				isScheduled = false;
			}, 500);

			return;
		};

		this.peers.set(this.myID, {
			"pc": pc,
			"dc": dataChannel
		});

		// Create offer as host
		pc.createOffer().then(offer => {
			console.log('I (Host) created the offer');
			pc.setLocalDescription(offer);

			// Send offer to Client
			// clientB_receiveOffer2(offer);

			// Store offer on server
			this.storeDataOnServer(`${this.myID}-offer`, offer);
		});

		// Wait for answer from CLIENT
		let interval = setInterval(async () => {
			const answer = await this.fetchDataFromServer(`${clientID}-answer`);
			if(!answer?.sdp) return;
			await pc.setRemoteDescription(new RTCSessionDescription(answer));

			// Fetch ICE candidates from CLIENT
			// Get candidate count
			let count = (await this.fetchDataFromServer(`${clientID}-ice-count`)).count ?? 0;
			if(!count){
				return;
			}
			// Add all ICE
			while(count--){
				const candidate = (await this.fetchDataFromServer(`${clientID}-ice-${count}`)).candidate;
				await pc.addIceCandidate(new RTCIceCandidate(candidate));
			}
			clearInterval(interval);
		}, 5000);
	}
	async storeICECandidatesOnServer(arr) {
		// Get ICE count from server
		await this.storeDataOnServer(`${this.myID}-ice-count`, {count: arr.length});
		arr.forEach((data, index) => {
			this.storeDataOnServer(`${this.myID}-ice-${index}`, data);
		});
	}
	async storeDataOnServer(key, data){
		await fetch(`https://blue-math-f85d.lenztan09.workers.dev/?key=${key}`, {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ value: data })
		});
	}
	async fetchDataFromServer(key){
		let resp = await fetch(`https://blue-math-f85d.lenztan09.workers.dev/?key=${key}`, {
			method: "GET",
			headers: { "Content-Type": "application/json" },
		});
		return resp.json();
	}
	// Called on client side
	async connectToHost(hostID) {
		// Set up my Peer Connection as client
		const pc = new RTCPeerConnection();

		pc.ondatachannel = (event) => {
			const dataChannel = event.channel;
			dataChannel.onmessage = (e) => console.log("Message:", e.data);
			this.peers.set(this.myID, {
				"pc": pc,
				"dc": dataChannel
			});
		};
		
		pc.onconnectionstatechange = () => {
  			console.log("Connection state:", pc.connectionState);
		};

		let iceCandidates = [];
		let isScheduled = false;
		pc.onicecandidate = (event) => {
			// Filter out non-null
			if(!event?.candidate) return;

			console.log('I (Client) got the ICE. Now sending to host');

			iceCandidates.push({candidate: event.candidate});

			if(isScheduled) return;
			isScheduled = true;

			setTimeout(() => {
				this.storeICECandidatesOnServer(iceCandidates);
				isScheduled = false;
			}, 500);
		};

		// Receive offer from HOST
		const offer = await this.fetchDataFromServer(`${hostID}-offer`);
		if(!offer?.sdp) return;
 		await pc.setRemoteDescription(new RTCSessionDescription(offer));

		// Fetch ICE candidates from HOST
		// Get ICE candidate count
		let count = (await this.fetchDataFromServer(`${hostID}-ice-count`)).count ?? 0;
		if(!count){
			return;
		}
		// Add ICE candidate
		while(count--){
			const candidate = (await this.fetchDataFromServer(`${hostID}-ice-${count}`)).candidate;
			await pc.addIceCandidate(new RTCIceCandidate(candidate));
		}
		console.log('done fetch cand from host');

		// Create answer
		const answer = await pc.createAnswer();
		await pc.setLocalDescription(answer);

		// Send answer back to HOST
		await this.storeDataOnServer(`${this.myID}-answer`, answer);
	}
}

(async () => {
	/*********************PIXI***********************/
	// Create a new application
	const app = new PIXI.Application();

	// Initialize the application
	await app.init({
		background: "#000",
		resizeTo: window,
		//resolution: window.devicePixelRatio || 1,
	});
	
	// Append the application canvas to the document body
	document.body.appendChild(app.canvas);
	/*********************PIXI***********************/
	
	
	
	
	let gameScene, activeScene, loadingScene;
	
	loadingScene = new LoadingScene(app);
	activeScene = loadingScene;
	activeScene.show();
	
	// Listen for animate update
	app.ticker.add((time) => {
		activeScene.update(time.deltaTime);
		if(loadingScene.isComplete && activeScene.type === "loading-scene"){
			activeScene.hide();
			activeScene.destroy();
			// Switch to game scene
			gameScene = new GameScene(app);
			activeScene = gameScene;
			activeScene.show();
		}
	});
	
	
})();

function sliceSheet(texture, frameCount, frameWidth, frameHeight) {
	const frames = [];
	let currentFrameWidth = 0;
	let currentFrameHeight = 0;
	while(frameCount--){
		const rect = new PIXI.Rectangle(
			currentFrameWidth,
			currentFrameHeight,
			frameWidth,
			frameHeight
		);
		frames.push(new PIXI.Texture(texture.baseTexture, rect));
		currentFrameWidth += frameWidth;
		if(currentFrameWidth >= texture.baseTexture.width){
			currentFrameHeight += frameHeight;
			currentFrameWidth = 0;
		}
	}
	return frames;
}
