const getDistance = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

function sliceSheet(texture, frameCount, frameWidth, frameHeight) {
	const frames = [];

	let x = 0;
	let y = 0;

	for (let i = 0; i < frameCount; i++) {
		const frame = new PIXI.Rectangle(x, y, frameWidth, frameHeight);

		const newTex = new PIXI.Texture({
			source: texture.source, // ✅ IMPORTANT (v8)
			frame: frame
		});

		frames.push(newTex);

		x += frameWidth;

		if (x + frameWidth > texture.width) {
			x = 0;
			y += frameHeight;
		}
	}

	return frames;
}

class InputController {
    constructor(overlay, chef, internalContainer) {
        this.overlay = overlay;
        this.chef = chef;
        this.internalContainer = internalContainer;

        this.pointerDownPos = null;
        this.currentContainerPos = null;
        this.isPointerDown = false;

        this.setupListeners();
    }

    setupListeners() {
        this.overlay.on('pointerdown', this.onPointerDown.bind(this));
        this.overlay.on('pointermove', this.onPointerMove.bind(this));
        this.overlay.on('pointerup', this.onPointerUp.bind(this));
        this.overlay.on('pointerout', this.onPointerUp.bind(this));
    }

    onPointerDown(event) {
        this.isPointerDown = true;
        this.pointerDownPos = event.data.global.clone();
        this.currentContainerPos = {
            x: this.internalContainer.x,
            y: this.internalContainer.y
        };
    }

    onPointerMove(event) {
        if(!this.isPointerDown) return;
        const currentMovePos = event.data.global.clone();
        if (getDistance(currentMovePos.x, currentMovePos.y, this.pointerDownPos.x, this.pointerDownPos.y) >= 10) {
            this.internalContainer.x = this.currentContainerPos.x + currentMovePos.x - this.pointerDownPos.x;
            this.internalContainer.y = this.currentContainerPos.y + currentMovePos.y - this.pointerDownPos.y;
        }
    }

    onPointerUp(event) {
        if(!this.isPointerDown) return;
        this.isPointerDown = false;
        const currentMovePos = event.data.global.clone();
        if (getDistance(currentMovePos.x, currentMovePos.y, this.pointerDownPos.x, this.pointerDownPos.y) < 10) {
			const x = this.pointerDownPos.x - this.currentContainerPos.x;
			const y = this.pointerDownPos.y - this.currentContainerPos.y;
			console.log(x, y);
            this.chef.moveTo(x, y);
        }
    }
}

class Chef {
	constructor(){
		this.animations = this.getAnimations();
		console.log(this.animations);
		this.sprite = new PIXI.AnimatedSprite(this.animations.idle);
		this.currentAnim = 'idle';
		
		this.sprite.anchor.set(0.5);
		this.sprite.scale.set(0.3);
		
		this.direction = 'right';

		this.sprite.animationSpeed = 0.15;
		this.sprite.play();
	}
	
	getAnimations() {
		const idleTex = PIXI.Texture.from('chef-idle');
		const walkTex = PIXI.Texture.from('chef-walking');
		const chopTex = PIXI.Texture.from('chef-chopping');
		
		console.log(idleTex);
		const animations = {
			idle: sliceSheet(idleTex, 5, 225, 350),
			chop: sliceSheet(chopTex, 5, 225, 350),
			walk: sliceSheet(walkTex, 4, 225, 350),
		};
		
		return animations;
	}
	
	setDirection(name){
		if(this.direction === name) return;
		this.direction = name;
		
		console.log(name);
		switch (name) {
			case 'right':
				this.sprite.scale.x = Math.abs(this.sprite.scale.x); 
			break;
			default:
				this.sprite.scale.x = -Math.abs(this.sprite.scale.x); 
			
		}
	}
	
	setAnimation(name){
		if (this.currentAnim === name) return;
		if (!this.animations[name]) return;
		console.log(name)
		this.currentAnim = name;
		this.sprite.textures = this.animations[name];
		this.sprite.play();
	}
	
	moveTo(x, y) {
		// Set target
		// Reset speed for next movement
		this.speed = 0.01;
		this.target = {x: x, y: y}
		//this.sprite.position.set(x, y);
	}
	
	update(delta) {
		if (!this.target) return;

		const dx = this.target.x - this.sprite.x;
		const dy = this.target.y - this.sprite.y;
		
		if(dx < -3){
			this.setDirection('left');
		}else {
			this.setDirection('right');
		}
		
		// Move with current speed
		if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
			//this.sprite.x = Math.round(this.sprite.x + dx < 0 ? -2 : 2);
			//this.sprite.y = Math.round(this.sprite.y + dy < 0 ? -2 : 2);
			//console.log(Math.round(this.sprite.x + dx < 0 ? -2 : 2));
			if(dx < 0){
				this.sprite.x = Math.round(this.sprite.x - 1);
			}else{
				this.sprite.x = Math.round(this.sprite.x + 1);
			}
			if(dy < 0){
				this.sprite.y -= 1;
			}else{
				this.sprite.y += 1;
			}
			//this.sprite.x += dx < 0 ? -2 : 2;//dx * this.speed;
			//this.sprite.y += dy < 0 ? -2 : 2;//dy * this.speed;
			
			// Increase speed gradually
			this.speed += 0.001;
			
			// Cap speed so it doesn’t go crazy
			if(this.speed > 0.02) this.speed = 0.02;
			
			this.setAnimation('walk');
		} else {
			this.setAnimation('idle');
			this.target = null;
			
			// Reset speed for next movement
			this.speed = 0.01;
		}
	}
	
	// Destroy chef safely
	destroy() {
		this.sprite.off();

		this.sprite.parent?.removeChild(this.sprite);
		
		this.sprite.destroy();
	}
}


(async () => {
	/*********************PIXI***********************/
	// Create a new application
	const app = new PIXI.Application();

	// Initialize the application
	await app.init({
		background: "#000",
		resizeTo: window,
		//resolution: window.devicePixelRatio || 1,
	});
	
	// Append the application canvas to the document body
	document.body.appendChild(app.canvas);
	/*********************PIXI***********************/
	
	
	let gameScene, activeScene, loadingScene;
	
	loadingScene = new LoadingScene(app);
	activeScene = loadingScene;
	activeScene.show();
	
	// Listen for animate update
	app.ticker.add((time) => {
		activeScene.update(time.deltaTime);
		if(loadingScene.isComplete && activeScene.type === "loading-scene"){
			activeScene.hide();
			activeScene.destroy();
			// Switch to game scene
			gameScene = new GameScene(app);
			activeScene = gameScene;
			activeScene.show();
		}
	});
})();
