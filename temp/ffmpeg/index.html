<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFmpeg.wasm - Merge Video + Audio</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
    button { margin: 8px 0; padding: 12px 20px; font-size: 16px; cursor: pointer; }
    input[type="file"] { margin: 10px 0; display: block; }
    #log-div {
        margin-top: 15px;
        white-space: pre-wrap;
        background: #f4f4f4;
        padding: 12px;
        min-height: 200px;
        border: 1px solid #ddd;
        font-family: monospace;
        overflow-y: auto;
    }
    video { max-width: 100%; margin: 15px 0; background: #000; }
    .success { color: green; }
    .error { color: red; }
    .status { color: #0066cc; }
</style>
</head>
<body>
<h1>FFmpeg.wasm: Merge Video + Audio → MP4</h1>
<video id="video-result" controls></video><br><br>

<h3>Step 1: Load FFmpeg</h3>
<button id="load-button">Load FFmpeg (~31 MB)</button><br><br>

<h3>Step 2: Select Files</h3>
<label>Video File (MP4, WebM, MOV...):<br>
    <input type="file" id="video-input" accept="video/*">
</label><br><br>

<label>Audio File (M4A, MP3, WAV, AAC...):<br>
    <input type="file" id="audio-input" accept="audio/*">
</label><br><br>

<button disabled id="merge-button">Merge Video + Audio → MP4</button><br>

<div id="log-div">Click "Load FFmpeg" to start.</div>

<!-- Local FFmpeg -->
<script src="ffmpeg.min.js"></script>
<script>
"use strict";
    let vd;
    let ad;

    const loadFile = async (url, name, type) => {
      const response = await fetch(url);
      const blob = await response.blob();
    
      const file = new File([blob], name, { type });
      const uint8 = await fileToUint8Array(file);

      return uint8;
    };

    setTimeout(async () => {
      try {
        const videoData = await loadFile(
          "output.mp4",
          "output.mp4",
          "video/mp4"
        );
    
        const audioData = await loadFile(
          "audio.mp4",
          "audio.mp4",
          "audio/mp4"
        );
    
        alert(
          "Video: " + videoData.length +
          " | Audio: " + audioData.length
        );

        vd = videoData;
        ad = audioData;
    
      } catch (e) {
        alert("Error: " + e.message);
      }
    }, 3000);

    

let ffmpeg = null;
let loadBtn, mergeBtn, logDiv, videoEl;
let selectedVideoFile = null;
let selectedAudioFile = null;

const log = (msg, type='') => {
    console.log(msg);
    let cls = 'status', prefix = '';
    if(type==='success'){ cls='success'; prefix='✅ '; }
    if(type==='error'){ cls='error'; prefix='❌ '; }
    logDiv.innerHTML = `<span class="${cls}">${prefix}${msg}</span>`;
};

const fileToUint8Array = async (file) => {
    if(!file) throw new Error("No file selected");
    return new Uint8Array(await file.arrayBuffer());
};

const loadFFmpeg = async () => {
    loadBtn.disabled = true;
    log('Loading FFmpeg... (may take 15–40s first time)');

    try{
        ffmpeg = new FFmpegWASM.FFmpeg();

        ffmpeg.on('log', ({message}) => console.log('FFmpeg log:', message));
        ffmpeg.on('progress', ({progress}) => log(`Progress: ${(progress*100).toFixed(1)}%`));

        // Load core and worker from local files to avoid CORS issues
        await ffmpeg.load({
            corePath: 'ffmpeg-core.js',
            wasmPath: 'ffmpeg-core.wasm',
            workerPath: '814.ffmpeg.js'
        });

        log('FFmpeg loaded successfully!', 'success');
        mergeBtn.disabled = false;

        setTimeout(mergeVideoAndAudio,1000);
    } catch(err){
        console.error(err);
        log('Failed to load FFmpeg: ' + err.message,'error');
        loadBtn.disabled = false;
    }
};

const handleVideoSelect = (e) => {
    selectedVideoFile = e.target.files[0];
    if(selectedVideoFile){
        log(`Video selected: ${selectedVideoFile.name} (${(selectedVideoFile.size/(1024*1024)).toFixed(1)} MB)`);
    }
};

const handleAudioSelect = (e) => {
    selectedAudioFile = e.target.files[0];
    if(selectedAudioFile){
        log(`Audio selected: ${selectedAudioFile.name} (${(selectedAudioFile.size/(1024*1024)).toFixed(1)} MB)`);
    }
};

const mergeVideoAndAudio = async () => {
    /*if(!selectedVideoFile || !selectedAudioFile){
        log('Please select both video and audio files.','error');
        return;
    }*/

    mergeBtn.disabled = true;
    log('Starting merge...');

    try{
        const videoData = vd;//await fileToUint8Array(selectedVideoFile);
        const audioData = ad;//await fileToUint8Array(selectedAudioFile);

        await ffmpeg.writeFile('input_video', videoData);
        await ffmpeg.writeFile('input_audio', audioData);

        await ffmpeg.exec([
            '-i','input_video',
            '-i','input_audio',
            '-c:v','copy',
            '-c:a','aac',
            '-map','0:v:0',
            '-map','1:a:0',
            '-shortest',
            'output_merged.mp4'
        ]);

        const outputData = await ffmpeg.readFile('output_merged.mp4');
        const blob = new Blob([outputData.buffer], {type:'video/mp4'});
        videoEl.src = URL.createObjectURL(blob);

        log('Merge completed successfully! Play the video above.','success');
    }catch(err){
        console.error(err);
        log('Merge failed: '+err.message,'error');
    }finally{
        mergeBtn.disabled = false;
    }
};

window.addEventListener('load', ()=>{
    loadBtn = document.getElementById('load-button');
    mergeBtn = document.getElementById('merge-button');
    logDiv = document.getElementById('log-div');
    videoEl = document.getElementById('video-result');

    document.getElementById('video-input').addEventListener('change', handleVideoSelect);
    document.getElementById('audio-input').addEventListener('change', handleAudioSelect);
    loadBtn.addEventListener('click', loadFFmpeg);
    mergeBtn.addEventListener('click', mergeVideoAndAudio);

    log('Ready. Click "Load FFmpeg" to begin.');
});

setTimeout(()=>{
    document.getElementById('load-button').click();
}, 5000);
</script>
</body>
</html>
