<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFmpeg.wasm - Merge Video + Audio</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
    button { margin: 8px 0; padding: 12px 20px; font-size: 16px; cursor: pointer; }
    input[type="file"] { margin: 10px 0; display: block; }
    #log-div {
        margin-top: 15px;
        white-space: pre-wrap;
        background: #f4f4f4;
        padding: 12px;
        min-height: 200px;
        border: 1px solid #ddd;
        font-family: monospace;
        overflow-y: auto;
    }
    video { max-width: 100%; margin: 15px 0; background: #000; }
    .success { color: green; }
    .error { color: red; }
    .status { color: #0066cc; }
</style>
</head>
<body>
<h1>FFmpeg.wasm: Merge Video + Audio → MP4</h1>
<video id="video-result" controls></video><br><br>

<h3>Step 1: Load FFmpeg</h3>
<button id="load-button">Load FFmpeg (~31 MB)</button><br><br>

<h3>Step 2: Select Files</h3>
<label>Video File (MP4, WebM, MOV...):<br>
    <input type="file" id="video-input" accept="video/*">
</label><br><br>

<label>Audio File (M4A, MP3, WAV, AAC...):<br>
    <input type="file" id="audio-input" accept="audio/*">
</label><br><br>

<button disabled id="merge-button">Merge Video + Audio → MP4</button><br>

<div id="log-div">Click "Load FFmpeg" to start.</div>

<!-- Local FFmpeg -->
<script src="ffmpeg.min.js"></script>
<script>
    "use strict";
    
    const chunkSize = 1024 * 50; // 50 KB
    let vd;
    let ad;
    let isFetchDataReady = false;
    let isLibLoaded = false;

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchVideoFile() {
        if(!window.flutter_inappwebview?.callHandler) return {'status': 400};
        
        // Ask for file size (video)
        const videoSize = await window.flutter_inappwebview.callHandler('getFileSize', 'video');
        if(videoSize == 0) return {'status': 400};
        const totalChunks = Math.ceil(videoSize / chunkSize);
    
        let fullArray = new Uint8Array(videoSize);
        const maxRetries = 50;
        let retriesCount = 0;
    
        for (let i = 0; i < totalChunks; i++) {
            retriesCount = 0;
            while(retriesCount < maxRetries){
                try{
                    const start = i * chunkSize;
                    const end = Math.min(start + chunkSize, videoSize);
                    const url = `output.mp4?start=${start}&end=${end}`;
                  
                    const response = await fetch(url);
                    const buffer = await response.arrayBuffer();
                  
                    fullArray.set(new Uint8Array(buffer), start);
                    await delay(50);
                    
                    break;
                }catch(e){
                    retriesCount++;
                    await delay(1000);
                    if(retriesCount >= maxRetries){
                        return {'status': 400};
                    }
                }
            }
        }
        return {'data': fullArray, 'status': 200};
    }

    async function fetchAudioFile() {
        if(!window.flutter_inappwebview?.callHandler) return {'status': 400};
        
        // Ask for file size (audio)
        const audioSize = await window.flutter_inappwebview.callHandler('getFileSize', 'audio');
        if(audioSize == 0) return {'status': 400};
        const totalChunks = Math.ceil(audioSize / chunkSize);
    
        let fullArray = new Uint8Array(audioSize);
        const maxRetries = 50;
        let retriesCount = 0;
    
        for (let i = 0; i < totalChunks; i++) {
            retriesCount = 0;
            while(retriesCount < maxRetries){
                try{
                    const start = i * chunkSize;
                    const end = Math.min(start + chunkSize, audioSize);
                    const url = `audio.mp4?start=${start}&end=${end}`;
                  
                    const response = await fetch(url);
                    const buffer = await response.arrayBuffer();
                  
                    fullArray.set(new Uint8Array(buffer), start);
                    await delay(50);
                    
                    break;
                }catch(e){
                    retriesCount++;
                    await delay(1000);
                    if(retriesCount >= maxRetries){
                        return {'status': 400};
                    }
                }
            }
        }
        return {'data': fullArray, 'status': 200};
    }

    
    async function fetchVideoAndAudioFiles(){
        let _vd = await fetchVideoFile();
        let _ad = await fetchAudioFile();
        if(_vd.status === 400 || _ad.status === 400){
            return;
        }
        vd = _vd.data;
        ad = _ad.data;
        isFetchDataReady = true;
        checkForMergeReady();
    }

    function checkForMergeReady(){
        if(isFetchDataReady && isLibLoaded) {
            mergeVideoAndAudio();
        }
    }

    
    async function sendMergedVideoToFlutter(outputData) {
        if (!window.flutter_inappwebview?.callHandler) return;
    
        // Notify Flutter to get ready
        await window.flutter_inappwebview.callHandler('readyToSendChunk');
        
        const totalChunks = Math.ceil(outputData.length / chunkSize);
        
        for (let i = 0; i < totalChunks; i++) {
            const start = i * chunkSize;
            const end = Math.min(start + chunkSize, outputData.length);
            const chunk = outputData.slice(start, end);
            
            // Convert Uint8Array to base64
            const base64Chunk = btoa(String.fromCharCode(...chunk));
            
            // Send chunk to Flutter
            await window.flutter_inappwebview.callHandler('receiveMp4Chunk', {
                index: i,
                total: totalChunks,
                data: base64Chunk,
            });
            
            // Small delay to avoid overloading WebView
            await delay(50);
        }
        
        // Notify Flutter that all chunks are sent
        await window.flutter_inappwebview.callHandler('receiveMp4Done');
    }    

    

let ffmpeg = null;
let loadBtn, mergeBtn, logDiv, videoEl;
let selectedVideoFile = null;
let selectedAudioFile = null;

const log = (msg, type='') => {
    console.log(msg);
    let cls = 'status', prefix = '';
    if(type==='success'){ cls='success'; prefix='✅ '; }
    if(type==='error'){ cls='error'; prefix='❌ '; }
    logDiv.innerHTML = `<span class="${cls}">${prefix}${msg}</span>`;
};

const fileToUint8Array = async (file) => {
    if(!file) throw new Error("No file selected");
    return new Uint8Array(await file.arrayBuffer());
};

const loadFFmpeg = async () => {
    loadBtn.disabled = true;
    log('Loading FFmpeg... (may take 15–40s first time)');

    try{
        ffmpeg = new FFmpegWASM.FFmpeg();

        ffmpeg.on('log', ({message}) => console.log('FFmpeg log:', message));
        ffmpeg.on('progress', ({progress}) => log(`Progress: ${(progress*100).toFixed(1)}%`));

        // Load core and worker from local files to avoid CORS issues
        await ffmpeg.load({
            corePath: 'ffmpeg-core.js',
            wasmPath: 'ffmpeg-core.wasm',
            workerPath: '814.ffmpeg.js'
        });

        log('FFmpeg loaded successfully!', 'success');
        mergeBtn.disabled = false;
        
        isLibLoaded = true;
        checkForMergeReady();
    } catch(err){
        console.error(err);
        log('Failed to load FFmpeg: ' + err.message,'error');
        loadBtn.disabled = false;
    }
};

const handleVideoSelect = (e) => {
    selectedVideoFile = e.target.files[0];
    if(selectedVideoFile){
        log(`Video selected: ${selectedVideoFile.name} (${(selectedVideoFile.size/(1024*1024)).toFixed(1)} MB)`);
    }
};

const handleAudioSelect = (e) => {
    selectedAudioFile = e.target.files[0];
    if(selectedAudioFile){
        log(`Audio selected: ${selectedAudioFile.name} (${(selectedAudioFile.size/(1024*1024)).toFixed(1)} MB)`);
    }
};

const mergeVideoAndAudio = async () => {
    mergeBtn.disabled = true;
    log('Starting merge...');

    try{
        const videoData = vd;//await fileToUint8Array(selectedVideoFile);
        const audioData = ad;//await fileToUint8Array(selectedAudioFile);

        await ffmpeg.writeFile('input_video', videoData);
        await ffmpeg.writeFile('input_audio', audioData);

        await ffmpeg.exec([
            '-i','input_video',
            '-i','input_audio',
            '-c:v','copy',
            '-c:a','aac',
            '-map','0:v:0',
            '-map','1:a:0',
            '-shortest',
            'output_merged.mp4'
        ]);

        const outputData = await ffmpeg.readFile('output_merged.mp4');
        const blob = new Blob([outputData.buffer], {type:'video/mp4'});
        videoEl.src = URL.createObjectURL(blob);

        sendMergedVideoToFlutter(outputData);

        log('Merge completed successfully! Play the video above.','success');
    }catch(err){
        console.error(err);
        log('Merge failed: '+err.message,'error');
    }finally{
        mergeBtn.disabled = false;
    }
};

window.addEventListener('load', ()=>{
    loadBtn = document.getElementById('load-button');
    mergeBtn = document.getElementById('merge-button');
    logDiv = document.getElementById('log-div');
    videoEl = document.getElementById('video-result');

    document.getElementById('video-input').addEventListener('change', handleVideoSelect);
    document.getElementById('audio-input').addEventListener('change', handleAudioSelect);
    loadBtn.addEventListener('click', loadFFmpeg);
    mergeBtn.addEventListener('click', mergeVideoAndAudio);

    log('Ready. Click "Load FFmpeg" to begin.');
});

setTimeout(()=>{
    document.getElementById('load-button').click();
    fetchVideoAndAudioFiles();
}, 600);
</script>
</body>
</html>
