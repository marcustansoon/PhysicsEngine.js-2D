<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
</head>
<body>

<video id="video" controls width="800"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById("video");

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource("http://iptv1.kavkom.tv:8000/live/doukr05o/h81lnb53ld/1716.m3u8");
  hls.attachMedia(video);
} else {
  video.src = "http://iptv1.kavkom.tv:8000/live/doukr05o/h81lnb53ld/1716.m3u8";
}
</script>

</body>
</html>
