  <script>
	  
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url');
	  
    const STREAM = videoUrl; 

    let TOKEN = "";
    let HLS;

    const video = document.getElementById("video");
    let error403Count = 0;
	  
	  // Overwrite existing XHR request
    (function () {
      const originalOpen = XMLHttpRequest.prototype.open;
    
      XMLHttpRequest.prototype.open = function (method, url, async, user, password) {
        if (method.toUpperCase() === "GET") {
			url = url.replaceAll("https://marcustansoon.github.io/PhysicsEngine.js-2D/video/", "").replaceAll("https://marcustansoon.github.io", "");
			
			const resolved = new URL(url, videoUrl);
          
          const newUrl =
            "https://marcustansoon.github.io/PhysicsEngine.js-2D/video/m3u8-player.html?murl=" +
            encodeURIComponent(resolved.href);
    
          	console.log("XHR Redirect:", url, "→", newUrl);
			document.getElementById('log').innerHTML += `<div>${url} -> ${newUrl}</div>`;
    
          arguments[1] = newUrl; // replace URL
        }
    
        return originalOpen.apply(this, arguments);
      };
    })();

	

    function autoUnmuteVideo() {
      let videoCurrentTime;
      let currentLoop = 0;
      let interval = setInterval(() => {
        console.log('run');
        currentLoop++;
        if (currentLoop >= 30) clearInterval(interval);
        if (isNaN(video.duration) || video.currentTime === 0) return;
        if (!videoCurrentTime) videoCurrentTime = video.currentTime;
        if (videoCurrentTime === video.currentTime) return;
        console.log('unmute');
        video.muted = false;
        clearInterval(interval);
      }, 2000);
    }



    setTimeout(start, 2000);

    function start() {

      if (Hls.isSupported()) {
        const hls = new Hls({



          lowLatencyMode: true,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,        // prevent buffer from growing too much
          backBufferLength: 10,
          maxBufferSize: 20 * 1000 * 1000, // 20MB is usually enough
          /*
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
        
          backBufferLength: 0,
        
          manifestLoadingMaxRetry: 30,
          fragLoadingMaxRetry: 30,
        
          manifestLoadingRetryDelay: 800,
          fragLoadingRetryDelay: 800*/
        });

        hls.loadSource(STREAM);
        hls.attachMedia(video);

		hls.on(Hls.Events.LEVEL_LOADED, (event, data) => {
		  const details = data.details;
		  console.log(data.details);
		  if (!details.live) {
			console.log("ENDLIST detected, retrying in 5s");
			/*setTimeout(()=>{
				HLS.destroy();
				HLS = null;
				start();
			}, 3000);*/
		  }
		});



        hls.on(Hls.Events.ERROR, function (event, data) {
          console.warn('HLS.js error', data);

          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                console.log('Fatal network error, trying to recover...');
                hls.startLoad(); // retry loading
                //if (data.response && data.response.code === 403) {
                //  error403Count++;
                //}
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log('Fatal media error, trying recovery...');
                hls.recoverMediaError();
                break;
              default:
                console.log('Unrecoverable error, destroying HLS instance');
                hls.destroy();
                break;
            }
          }
        });

        HLS = hls;


      } else {
        video.src = STREAM;
      }


    }
  </script>
