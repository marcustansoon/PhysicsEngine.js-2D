	function startStream(streamUrl) {
		// Check if HLS.js is supported
		if (!is_HLS_supported) {
			return;
		}

		// Clean up previous hls
		destroyStream();
		
	    // Set video parameter as autoplay and muted
	    video.autoplay = true;
	    video.muted = true;
	    video.playsInline = true;

		// Create HLS instance
    	hls = new Hls({
		  maxBufferLength: 90,       // target buffer
		  maxMaxBufferLength: 180,   // absolute cap
		  backBufferLength: 30,      // keep 30s behind
		  startFragPrefetch: true
		});

		// Store video resolution
		hls.on(Hls.Events.MANIFEST_PARSED, () => {
			hls.levels.forEach(resolution => {
				videoResolutions.push(resolution.height);
			});
		});

		let retryCount = 0;
		hls.on(Hls.Events.ERROR, (event, data) => {
		  if (data.fatal && retryCount < 100) {
		    retryCount++;
		    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
		    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
		  }
		});

		// setTimeout(()=>{
		// 	window.flutter_inappwebview?.callHandler?.('sendMessageToFlutter', {'action': 'video-resolution', data: videoResolutions});
		// }, 1500);
		
	    // Load HLS stream
	    hls.loadSource(streamUrl);
	    hls.attachMedia(video);
	}
	  
	function destroyStream() {
		// Clean up previous hls
		if (hls) {
		  hls.detachMedia(); 
		  hls.destroy();
		  hls = null;
		}
		// Reset resolution
		videoResolutions.length = 0;
		videoResolutions.push('Auto');
	}

async function receiveMessageFromFlutter(msg) {
	if(!msg) return;
	try{
		let message = msg;
		if(!message.action) return;
		if(message.action === "addSubtitle" && message.data && message.label && message.language){
			// tracks[message.label] = addSubtitleFromVttString(message.data, message.label, message.language);
		}else if(message.action === "play"){
			video.play();
		}else if(message.action === "unmute"){
			video.muted = false;
		}else if(message.action === "mute"){
			video.muted = true;
		}else if(message.action === "pause"){
			video.pause();
		}else if(message.action === "setstreamurl" && message.url){
			m3u8URL = message.url;
		}else if(message.action === "setsubtitleurl" && message.url && message.label && message.language){
			let content = await fetchSubtitleFromURL(message.url);
			if(!content) return;
			// Check for SRT format url - Convert into VTT format
			if(message.url.includes('.srt')){
				content = srtToVtt(content);
			}
    		// Remove existing track
    		const label = message.label.toLowerCase();
			if (tracks[label]) {
			    removeSubtitleTrackByLabel(label);
			}
			tracks[label] = addSubtitleFromVttString(content, label, message.language);
		}else if(message.action === "setsubtitledata" && message.data && message.label && message.language && message.type){
			let content = message.data;
			if(!content) return;
			// Check for SRT format url - Convert into VTT format
			if(message.type ==='srt'){
				content = srtToVtt(content);
			}
    		// Remove existing track
    		const label = message.label.toLowerCase();
			if (tracks[label]) {
			    removeSubtitleTrackByLabel(label);
			}
			tracks[label] = addSubtitleFromVttString(content, label, message.language);
		}else if(message.action === "showsubtitle" && message.label){
			showSubtitles(message.label);
		}else if(message.action === "hidesubtitle"){
			hideAllSubtitles();
		}else if(message.action === "start"){
			startStream(m3u8URL);
		}else if(message.action === "rewind-video"){
			rewindVideo();
		}else if(message.action === "forward-video"){
			forwardVideo();
		}else if(message.action === "set-video-resolution-auto"){
			autoSetResolution();
		}else if(message.action === "set-video-resolution" && message.data){
			let resolution = parseInt(message.data);
			if(isNaN(resolution)) return;
			setResolution(resolution);
		}else if(message.action === "get-video-resolutions"){
			window.flutter_inappwebview?.callHandler?.('sendMessageToFlutter', {'action': 'get-video-resolutions', data: videoResolutions});
		}else if(message.action === "get-video-duration"){
			let duration = Math.floor(video.duration);
			window.flutter_inappwebview?.callHandler?.('sendMessageToFlutter', {'action': 'get-video-duration', data: isNaN(duration) ? 0 : duration});
		}else if(message.action === "set-video-duration" && message.data){
			let duration = parseInt(message.data);
			if(isNaN(video.duration) || isNaN(duration) || duration > video.duration) return;
			video.currentTime = duration;
		}else if(message.action === "setsubtitledelay"){
			// Check if 'english' labelled track exists (hardcoded)

			let delay = parseFloat(message['data']);
			if(isNaN(delay)) return;
			setSubtitleDelay(tracks["english"], delay);
		}else if(message.action === "run"){
			alert('running 2');
		    hls = new Hls();
		
		    // Replace with your actual HLS stream URL
		    var streamUrl = 'https://p.10020.workers.dev/skyember44.online/file2/GSY77jpcftrExmTqD9I6YXthvYLhyjVkQsYmsY1zIwdZ~h8PuV~TTP23qXFbgAVpr3BnYDT86Qm4bQ0vtgaPeyEC32zaCyrT6m9sTqYIdw~tWu7UE9shlHrskaZszWrpGDu4U0FPuEXusBycsjttyB~MtpxxKq2KesIUyK1dbB0=/MTA4MA==/aW5kZXgubTN1OA==.m3u8'; // Example: 'https://example.com/video.m3u8'
			//var streamUrl = 'https://test-streams.mux.dev/x36xhzz/url_0/193039199_mp4_h264_aac_hd_7.m3u8'; // Example: 'https://example.com/video.m3u8'
			m3u8URL = streamUrl;
			
		    // Load HLS stream
		    hls.loadSource(streamUrl);
		    hls.attachMedia(video);

		}
	} catch(e) {
		console.error(e);
		document.getElementById('log').innerHTML += `<div>err: ${e}</div>`;
	}

// Set a specific resolution manually
function setResolution(height) {
  if (!hls || !hls.levels || hls.levels.length === 0) return;

  const index = hls.levels.findIndex(level => level.height === height);
  if (index !== -1) {
    console.log(`Switching to ${height}p (level ${index})`);
    hls.currentLevel = index;
  } else {
    console.warn(`Resolution ${height}p not found`);
  }
}

// Return to automatic adaptive bitrate
function autoSetResolution() {
  if (!hls) return;

  console.log("Switching back to auto resolution (-1)");
  hls.currentLevel = -1;
}

function forwardVideo(){
	if (video) {
		video.currentTime = Math.max(video.currentTime + 5, 0);
	}
}
	  
function rewindVideo(){
	if (video) {
		video.currentTime = Math.max(video.currentTime - 5, 0);
	}
}

function removeSubtitleTrackByLabel(label){
	const oldTrack = tracks[label];
	 // Hide subtitles
	oldTrack.mode = "disabled";
	// Remove all cues
	while (oldTrack.cues && oldTrack.cues.length > 0) {
	    oldTrack.removeCue(oldTrack.cues[0]);
	 }
	delete tracks[label];
}

function setSubtitleDelay(track, delaySeconds) {
    if (!track || !track.cues) return;

    const cues = Array.from(track.cues);

    cues.forEach(cue => {

        if (cue._origStart === undefined) {
            cue._origStart = cue.startTime;
            cue._origEnd = cue.endTime;
        }

        track.removeCue(cue);

        cue.startTime = Math.max(0, cue._origStart + delaySeconds);
        cue.endTime   = Math.max(0, cue._origEnd + delaySeconds);

        track.addCue(cue);
    });
}

async function fetchSubtitleFromURL(url) {
  try {
    const sURL =
            "https://marcustansoon.github.io/PhysicsEngine.js-2D/video/hls.html?isSubtitle=true&url=" +
            encodeURIComponent(url);
    const response = await fetch(sURL);

    if (!response.ok) {
      throw new Error(`HTTP error! Status: ${response.status}`);
    }

    const vttText = await response.text();
    return vttText;
  } catch (error) {
    console.error('Error loading VTT:', error);
	return null;
  }
}


 function addSubtitleFromVttString(vttString, label = 'English', language = 'en', kind = 'subtitles') {
  // 1. Create the track (hidden at first is fine – change to 'showing' when you want to display)
  const track = video.addTextTrack(kind, label, language);
	 
	// Important: start hidden (preload, but not visible)
  track.mode = 'hidden';

  // 2. Very simple but effective VTT parser
  const lines = vttString.split(/\r?\n/);
  let i = 0;

  // Skip header until we find a blank line (WEBVTT + optional metadata)
  while (i < lines.length && lines[i].trim() !== '') {
    i++;
  }
  i++; // skip the blank line after header

  while (i < lines.length) {
    let line = lines[i].trim();

    // Skip empty lines, NOTE blocks, STYLE blocks, etc.
    if (!line || line.startsWith('NOTE') || line.startsWith('STYLE') || line.startsWith('REGION')) {
      i++;
      continue;
    }

    // Timestamp line: 00:00:01.000 --> 00:00:04.000  (optional settings after)
    if (/^\d{2}:\d{2}:\d{2}\.\d{3}\s-->\s\d{2}:\d{2}:\d{2}\.\d{3}/.test(line)) {
      const parts = line.split(/\s+/);
      const startStr = parts[0];
      const endStr   = parts[2];   // parts[1] is -->

      const start = vttTimeToSeconds(startStr);
      const end   = vttTimeToSeconds(endStr);

      // Collect cue text (all following non-empty lines until blank line)
      let text = '';
      i++;
      while (i < lines.length && lines[i].trim() !== '') {
        if (text) text += '\n';
        text += lines[i].trim();
        i++;
      }

      if (text && !isNaN(start) && !isNaN(end) && start < end) {
        const cue = new VTTCue(start, end, text);
        // Optional: customize cue appearance
        // cue.align     = 'middle';
        // cue.position  = 'auto';
        // cue.line      = 'auto';
        track.addCue(cue);
      }
    } else {
      i++;
    }
	
	  
  }
	return track; 
 }

function vttTimeToSeconds(timeStr) {
  const parts = timeStr.split(':');
  let sec = 0;
  if (parts.length === 3) {
    sec += parseInt(parts[0], 10) * 3600;
    sec += parseInt(parts[1], 10) * 60;
    sec += parseFloat(parts[2]);
  }
  return sec;
}

function showSubtitles(label) {
	  let targetTrack = tracks[label.toLowerCase()];
	  
	  // Hide all subtitles
	hideAllSubtitles();

	  if(!targetTrack) return;
	  
	  // Show the chosen one
	 targetTrack.mode = 'showing';
}

function hideAllSubtitles() {
  for (const track of video.textTracks) {
    if (track.kind === 'subtitles' || track.kind === 'captions') {
      track.mode = 'hidden';
    }
  }
  console.log("All subtitles hidden");
}


/**
 * Converts SRT subtitle content to VTT format
 * @param {string} srt - The SRT file content as a string
 * @returns {string} - The converted VTT content
 */
function srtToVtt(srtContent) {
    // Normalize line endings and split into blocks
    const lines = srtContent
        .trim()
        .replace(/\r\n|\r/g, '\n')  // normalize to \n
        .split('\n\n');

    let vtt = 'WEBVTT\n\n';

    for (const block of lines) {
        const parts = block.trim().split('\n');

        if (parts.length < 2) continue; // skip invalid blocks

        let timeLineIndex = 0;
        if (/^\d+$/.test(parts[0].trim())) {
            timeLineIndex = 1; // skip sequence number
        }

        const timeLine = parts[timeLineIndex]?.trim();
        if (!timeLine || !timeLine.includes('-->')) continue;

        // Convert SRT timestamp → VTT timestamp
        const [start, end] = timeLine.split('-->').map(t => t.trim());
        const vttStart = start.replace(',', '.');
        const vttEnd   = end.replace(',', '.');

        // Collect all text lines after the timestamp
        const textLines = parts.slice(timeLineIndex + 1)
            .map(line => line.trim())
            .filter(line => line !== '');

        if (textLines.length === 0) continue;

        // Build cue (correct template literal syntax)
        vtt += `${vttStart} --> ${vttEnd}\n`;
        vtt += textLines.join('\n');
        vtt += '\n\n';
    }

    return vtt.trim();
}
